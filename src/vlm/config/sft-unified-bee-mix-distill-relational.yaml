defaults:
    - sft-unified-bee-mix
    - _self_

# Distillation matrix (spec 2026-06-21) — RELATIONAL arm (OURS).
# Align the token-token similarity (Gram) matrix of the mid-depth LLM hidden to
# CLIP's Gram matrix — NO projection head, dimension-free: transfers the
# relational structure of the visual scene rather than absolute features. Tests
# whether matching "which patches are similar to which" is enough.
#
# Comparable to baseline-mix / repa. Launch:
#   CONFIG_NAME=sft-unified-bee-mix-distill-relational sbatch train_l40s.slurm

model:
    visual_distill:
        enabled: true
        method: relational
        teacher_kind: clip
        teacher_name: openai/clip-vit-base-patch16

trainer:
    visual_distill_weight: 1.0
    run_name: distill-relational-beemix-2b
