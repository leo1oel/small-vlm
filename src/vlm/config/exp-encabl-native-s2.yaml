defaults:
  - cfg
  - model: qwen3-0.6b-unified
  - trainer: finetune # unfreeze=LM+connector (vision tower stays frozen: n/a here)
  - inference: default
  - dataset: energon-honey-sft-wds
  - override hydra/job_logging: rich
  - _self_

# ENCODER ABLATION — Group G2 (native encoder-free), STAGE 2.
# Instruction SFT on Honey-Data-1M (~1M, multi-turn). Resumes from the G2 S1
# caption checkpoint (VLM_S1_CKPT). Trains LM + connector (finetune unfreeze).
# Qwen3 ChatML template (qwen_2_5). Visual experts OFF, BREEN OFF.

model:
  audio:
    enabled: false

trainer:
  version: qwen_2_5 # Qwen3 ChatML multi-turn template (NOT v1/plain — see report)
  from_pretrained: ${oc.env:VLM_S1_CKPT} # G2 Stage-1 checkpoint dir (REQUIRED)

  # --- max-speed (identical to S1) ---
  deepspeed: null
  bf16: true
  tf32: true
  gradient_checkpointing: false
  attn_implementation: flash_attention_2
  optim: adamw_torch_fused
  loss_chunk_size: 1024
  torch_compile: false # graph-breaks + recompiles -> ~20x slower (report.md)
  ddp_timeout: 7200
  include_num_input_tokens_seen: non_padding # wandb logs total tokens seen
  group_by_modality_length: false # energon streams (no map-style length grouping)

  per_device_train_batch_size: 256 # nominal only under dataset.batch_token_budget
  gradient_accumulation_steps: 1

  # EQUAL-TOKEN fairness: SAME budget (20000, from energon-honey-sft-wds) + SAME
  # max_steps for G1/G2. Honey multi-turn is long (~3800 eff tokens/sample) so
  # only ~5.0 samples/microbatch @ 20000 -> 30/optimizer-step (x6) -> 33500 steps
  # ≈ 1.0M samples (~1 epoch of Honey-Data-1M).
  max_steps: 33500
  save_steps: 2500 # 13 checkpoints
  save_total_limit: null
  save_only_model: false

  learning_rate:
    language_model_learning_rate: 6e-5
    connector_learning_rate: 6e-5
    visual_encoder_learning_rate: 6e-5 # no-op for encoder-free
    default_lr: 6e-5

  run_name: encabl-native-s2

hydra:
  job:
    chdir: true
  job_logging:
    root:
      level: INFO
  run:
    dir: outputs/${model.name}/${trainer.name}/${dataset.name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/${model.name}/${trainer.name}/${dataset.name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
