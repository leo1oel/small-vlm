defaults:
  - sft-unified-bee-mix
  - _self_

# Distillation matrix v2 (spec 2026-06-21) — repa + SigLIP teacher.
# Single-variable change vs sft-unified-bee-mix-distill-repa: teacher CLIP ->
# SigLIP (the data-optimal dense target per the predictivity probe). REPA-faithful
# single mid-layer (~0.3 depth) MLP alignment, per-patch neg cosine.
#
# Compare against sft-unified-bee-mix-distill-repa (CLIP, same step). Launch:
#   CONFIG_NAME=sft-unified-bee-mix-distill-repa-siglip sbatch train_l40s.slurm

model:
  visual_distill:
    enabled: true
    method: repa
    teacher_kind: siglip
    teacher_name: google/siglip-base-patch16-224

trainer:
  visual_distill_weight: 1.0
  run_name: distill-repa-siglip-2b
