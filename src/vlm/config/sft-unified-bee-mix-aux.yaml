defaults:
  - sft-unified-bee-mix
  - _self_

# 48G matrix — Arm 2 (aux-mix): Arm 1 plus the aux-exit CE at decoder layer 6
# with λ=0.5 (upper end of the EE-LLM-validated 0.1-0.5 range; the H200 arm
# runs 0.25 on the no-Bee blend — this arm is only compared within the 48G
# matrix). Same seed as Arm 1 -> identical energon stream order step for step.
# Caption targets are the most visually-grounded supervision in the mix, so
# the Bee third of the stream is where most of the aux fusion pressure lands.
#
# wandb: ce_final must track Arm 1's 'loss' (within ~1%); ce_aux's decay is
# the layer-6 readability curve.
#
# Cluster launch (dedicated L40S, non-preemptible):
#   CONFIG_NAME=sft-unified-bee-mix-aux sbatch train_l40s.slurm

trainer:
  aux_exit_layers: [6]
  aux_exit_weight: 0.5
  aux_exit_detach: false
