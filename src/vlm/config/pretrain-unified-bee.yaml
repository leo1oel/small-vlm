defaults:
    - cfg
    - model: qwen3-1.7b-unified
    - trainer: pretrain # unfreeze=connector-only + version=plain: the stage-1 recipe
    - inference: default
    - dataset: energon-bee-caption
    - override hydra/job_logging: rich
    - _self_

# Stage-1 connector pretrain for the encoder-free unified model on the Bee
# Stage-1 caption pairs (~998k image-caption records): freeze the Qwen3
# backbone, train only the ~19.5M-param image connector on "<image> ->
# caption" (plain template drops the user text and supervises the whole
# caption). Stage-2 then resumes via sft-unified with
# VLM_PRETRAIN_CKPT=<this run's checkpoint> (drop its from_pretrained: null).
#
# Cluster launch: CONFIG_NAME=pretrain-unified-bee sbatch train.slurm
# Local smoke (no GPU cluster; first run auto-downloads the ~960MB jsonl):
#   python -m vlm -cn pretrain-unified-bee \
#     model=qwen3-0.6b-unified \
#     dataset.num_workers=1 trainer.max_steps=3 trainer.deepspeed=null \
#     trainer.attn_implementation=sdpa trainer.report_to=none

model:
    audio:
        # Image-caption data only: skip the audio connector entirely, same as
        # the vision-only SFT arm (no dummy-audio zero-grad churn).
        enabled: false

trainer:
    # Nominal only under dataset.batch_token_budget (the loader sizes each
    # bucket batch itself); acc=1 -> one token-budget micro per optimizer step.
    per_device_train_batch_size: 256
    gradient_accumulation_steps: 1
    # The llava-pretrain default (1e-3) was tuned for a thin MLP on CLIP
    # features at effective-256. Here the RawPatchConnector IS the (randomly
    # initialized) vision path and the token budget gives ~1260 samples/step;
    # NEO's encoder-free connector-only PT reference uses 8e-4 at eff-2560.
    learning_rate:
        language_model_learning_rate: 8e-4 # no-op: backbone frozen
        connector_learning_rate: 8e-4
        visual_encoder_learning_rate: 8e-4 # no-op for encoder-free
        default_lr: 8e-4
    # pretrain's 0.03 ratio would be ~24 steps at this run length — too short
    # for a random-init connector at 8e-4. >=1 means absolute steps.
    warmup_steps: 100
    # ~1260 samples/step (token budget, measured caption distribution) ->
    # ~790 steps = 1 epoch over the 998k pairs; classic stage-1 is 1 epoch.
    # Confirm against the live samples_seen_session rate in the first ~200
    # steps and adjust.
    max_steps: 800
    # ckpt-partition jobs get preempted well within train.slurm's 4h walltime;
    # connector-only checkpoints are ~3.7GB (frozen backbone weights + ~0.3GB
    # connector optimizer state), so save often and keep all 8 for
    # checkpoint-wise eval curves.
    save_steps: 100
    save_total_limit: null
    # Preemptible (ckpt/requeue) runs must resume the LR schedule and the
    # energon stream state exactly (overrides trainer/pretrain's True).
    save_only_model: false
    # Chunked CE (parity-tested in the SFT arm): drops ignored positions
    # before lm_head, fp32 CE in 1024-token chunks. Works with the frozen
    # backbone — grads flow through lm_head to the connector regardless.
    loss_chunk_size: 1024
    # Extra wandb accounting: per-log-step real (non-padding) input tokens +
    # tokens/sec from transformers.
    include_num_input_tokens_seen: non_padding

hydra:
    job:
        chdir: true
    job_logging:
        root:
            level: INFO
    run:
        dir: outputs/${model.name}/${trainer.name}/${dataset.name}/${now:%Y-%m-%d_%H-%M-%S}
    sweep:
        dir: multirun/${model.name}/${trainer.name}/${dataset.name}/${now:%Y-%m-%d_%H-%M-%S}
        subdir: ${hydra.job.num}
