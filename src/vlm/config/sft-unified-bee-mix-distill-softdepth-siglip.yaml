defaults:
    - sft-unified-bee-mix
    - _self_

# Distillation matrix v2 (spec 2026-06-21) — softdepth + SigLIP teacher.
# Single-variable change vs sft-unified-bee-mix-distill-softdepth: teacher
# CLIP -> SigLIP. Motivation: the predictivity probe (neo_analysis) shows native
# models develop SigLIP features FAR more readily than CLIP (R² ~0.5-0.65 vs
# ~0.31-0.47), so SigLIP is the data-optimal dense target. Tests whether the
# weak/mixed CLIP-teacher benchmark movement was a teacher-choice problem.
#
# Compare against sft-unified-bee-mix-distill-softdepth (CLIP, same step) to
# attribute the teacher swap cleanly. Launch:
#   CONFIG_NAME=sft-unified-bee-mix-distill-softdepth-siglip sbatch train_l40s.slurm

model:
    visual_distill:
        enabled: true
        method: softdepth
        teacher_kind: siglip
        teacher_name: google/siglip-base-patch16-224
        layers: [4, 8, 12, 16, 20, 24]

trainer:
    visual_distill_weight: 1.0
    run_name: distill-softdepth-siglip-2b
