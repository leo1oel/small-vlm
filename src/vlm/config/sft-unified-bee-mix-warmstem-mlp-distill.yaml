defaults:
    - sft-unified-bee-mix
    - _self_

# GEN-2 goal-exact arm (2026-06-22, max_steps=1000 so step 1000 is the
# fully-decayed CONVERGED checkpoint, directly comparable to the R0 bar — the
# gen-1 1500-step arms gave a non-converged @1000). Stacks every in-bounds
# encoder-free lever:
#   - SigLIP conv patch-embed transplant (warm tokenizer, pretrained low-level)
#   - 2-layer GELU MLP connector head (LLaVA-1.5; nonlinear capacity to COMBINE
#     the 9 transplanted sub-patch features the single linear was squashing)
#   - SigLIP softdepth distillation (supervise the deep layers toward the
#     semantic features the conv can't provide)
#   - high connector LR (2e-4) + DELTA_TUNING (freeze text FFN, train visual
#     pathway + attention) for sample efficiency in the tiny budget.
#
# Launch on non-preempt a40 (reliable; starts when W1/W2 free slots):
#   CONFIG_NAME=sft-unified-bee-mix-warmstem-mlp-distill DELTA_TUNING=1 \
#   sbatch -p gpu-a40 --gpus=a40:4 --cpus-per-task=32 --mem=320G \
#     --time=6:00:00 --export=ALL train_l40s.slurm

model:
    connector:
        patch_stem: siglip
        patch_stem_name: google/siglip-base-patch16-224
        patch_stem_kernel: 16
        patch_mlp_hidden: 4096
    visual_distill:
        enabled: true
        method: softdepth
        teacher_kind: siglip
        teacher_name: google/siglip-base-patch16-224
        layers: [4, 8, 12, 16, 20, 24]

trainer:
    max_steps: 1000
    save_steps: 250
    visual_distill_weight: 1.0
    learning_rate:
        connector_learning_rate: 2e-4
        language_model_learning_rate: 6e-5
        visual_encoder_learning_rate: 6e-5
        default_lr: 6e-5
    run_name: warmstem-mlp-distill-1k
