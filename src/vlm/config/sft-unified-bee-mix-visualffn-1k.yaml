defaults:
    - sft-unified-bee-mix
    - _self_

# 1000-step catch-up matrix (2026-06-22) — BREEN/Mono-InternVL done right:
# per-layer visual-FFN experts init-copied from the text FFN (pretrained
# knowledge transplant, no data), trained under DELTA_TUNING (freeze text FFN +
# embeddings + lm_head, keep connector + mlp_visual experts + attention) so the
# tiny step budget concentrates on the visual pathway and the language shortcut
# can't starve it. BREEN reports +7.1 ScienceQA / +17.5 MME from this init alone.
# Short schedule for the goal: 1500 / save250.
#
# Launch (delta-tuning is REQUIRED for the BREEN recipe — set the env):
#   CONFIG_NAME=sft-unified-bee-mix-visualffn-1k DELTA_TUNING=1 \
#   sbatch -p ckpt-all -A krishna-ckpt --gpus=a40:4 --cpus-per-task=32 \
#     --mem=320G --time=8:00:00 train_l40s.slurm

model:
    visual_expert:
        enabled: true
        layers: null
        init_from_text: true

trainer:
    max_steps: 1500
    save_steps: 250
    run_name: visualffn-delta-1k
