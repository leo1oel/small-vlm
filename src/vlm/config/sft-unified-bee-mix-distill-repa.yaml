defaults:
    - sft-unified-bee-mix
    - _self_

# Distillation matrix (spec 2026-06-21) — REPA arm. Align ONE mid-depth LLM
# layer (~0.3 depth = layer 8 of 28) to CLIP-B/16's final per-patch features
# with an MLP head + per-patch negative cosine. = REPA (arXiv:2410.06940)
# applied to understanding (REPA aligns a diffusion-transformer layer to DINOv2
# for generation; here LLM->CLIP). Teacher reconstructs the SAME pixels the model
# sees (lossless inverse of the raw patches) so there are no dataloader changes.
#
# Same blend/steps/seed/budget as Arm 1 (baseline-mix) -> identical energon
# stream, directly comparable. Watch the "distill" loss (should fall toward 0)
# and "distill_cos" (native<->CLIP cosine, should rise); CE (ce_final) must NOT
# degrade vs baseline — if it rises, lower trainer.visual_distill_weight.
#
# Launch: CONFIG_NAME=sft-unified-bee-mix-distill-repa sbatch train_l40s.slurm

model:
    visual_distill:
        enabled: true
        method: repa
        teacher_kind: clip
        teacher_name: openai/clip-vit-base-patch16

trainer:
    visual_distill_weight: 1.0
    run_name: distill-repa-beemix-2b
