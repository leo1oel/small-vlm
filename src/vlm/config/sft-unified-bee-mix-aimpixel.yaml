defaults:
  - sft-unified-bee-mix
  - _self_

# 48G matrix — visual-aux arm (aim_pixel): Arm 1 (baseline-mix) plus the
# next-patch PIXEL prediction loss at image positions (AIM/AIMv2-style;
# per-patch z-scored MSE through a fresh 2-layer MLP head, spec
# 2026-06-06-visual-aux-loss-design.md). Same blend, steps (5000 x ~500
# samples), seed and token budget as Arm 1 -> identical energon stream order,
# directly comparable checkpoint-wise curves.
#
# wandb: 'visual_aux' is the pixel-MSE component (λ-independent); text 'loss'
# minus 0.5*visual_aux should track Arm 1's loss within ~1%.
#
# Cluster launch (dedicated L40S, non-preemptible):
#   CONFIG_NAME=sft-unified-bee-mix-aimpixel sbatch train_l40s.slurm

model:
  visual_aux:
    objective: aim_pixel

trainer:
  visual_aux_weight: 0.5
