defaults:
  - exp-encabl-native-s2
  - _self_

# 10-EXP ablation — Exp 8 (+ visual expert + visual norm + distill CLIP SOFTMAX), STAGE 2.
# Base = exp-encabl-native-s2. Carries the FFN + EVEv2 norm experts + softdepth
# CLIP distillation (self-selected depth over [4,8,12,16,20,24], anti-collapse
# A+B) through SFT with the LM UNFROZEN. The depth_logits + distill head + debias
# EMA buffers serialize into the S1 checkpoint and rebuild on the from_pretrained
# S2 build (trained buffers loaded). Pair VLM_S1_CKPT with the Exp-8 S1 checkpoint.

model:
  visual_expert:
    enabled: true
    ffn: true
    norm: true
  visual_distill:
    enabled: true
    method: softdepth
    teacher_kind: clip
    teacher_name: openai/clip-vit-base-patch16
    layers: [4, 8, 12, 16, 20, 24]
    debias_target: true
    debias_momentum: 0.9
    rkd_dist_weight: 1.0

trainer:
  visual_distill_weight: 1.0
  run_name: encabl-e8-vexpert-norm-distill-softdepth-s2
