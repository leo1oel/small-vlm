defaults:
  - sft-unified-bee-mix
  - _self_

# 48G matrix — image-grounding margin arm (spec 2026-06-18): Arm 1
# (baseline-mix) plus the grounding hinge loss. For every answer token of an
# image-bearing sample, the gold-token logp WITH the real image must beat the
# logp with a BLANKED image (image-position embeddings zeroed) by >= margin
# nats, else a per-token penalty applies: L = L_CE + w * mean(relu(margin +
# logp_blank - logp_real)). The negative pass is no_grad (we only reward USING
# the image, never teach the blank path to be worse). Directly optimizes the
# R0 (intact - swap) quantity the FDI probe measures -> pushes the model out of
# the language-prior basin so it conditions on pixels.
#
# Same blend, steps, seed and token budget as Arm 1 -> identical energon stream
# order, directly comparable to baseline / capacity / nepa. Costs one extra
# no_grad backbone forward per step (~+1/3 wall, no extra activation memory).
#
# Mechanism validated by devtools/grounding_smoke.py overfit: gold-token gap
# logp_real - logp_blank swung -2.3 -> +2.8 and toy R0 -> 1.
#
# wandb: watch the "grounding" loss component (should fall) AND ce_final /
# train loss (must NOT degrade vs baseline — if CE rises, lower model.grounding
# .weight or margin). Conservative start: weight 0.5, margin 0.5 nats.
#
# Cluster launch (dedicated L40S, non-preemptible):
#   CONFIG_NAME=sft-unified-bee-mix-grounding sbatch train_l40s.slurm

model:
  grounding:
    enabled: true
    weight: 0.5
    margin: 0.5

trainer:
  run_name: grounding-beemix-2b
