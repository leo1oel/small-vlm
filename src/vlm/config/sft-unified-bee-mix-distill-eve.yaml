defaults:
  - sft-unified-bee-mix
  - _self_

# Distillation matrix (spec 2026-06-21) — EVE arm (last-layer Patch-Aligning).
# Align the FINAL post-norm hidden state to CLIP-B/16's final per-patch features
# (EVE arXiv:2406.11832 PAL, last-layer variant). The "late" baseline: pull the
# model's output representation onto the CLIP manifold rather than a mid layer.
#
# Comparable to baseline-mix / repa. Launch:
#   CONFIG_NAME=sft-unified-bee-mix-distill-eve sbatch train_l40s.slurm

model:
  visual_distill:
    enabled: true
    method: eve
    teacher_kind: clip
    teacher_name: openai/clip-vit-base-patch16

trainer:
  visual_distill_weight: 1.0
  run_name: distill-eve-beemix-2b
