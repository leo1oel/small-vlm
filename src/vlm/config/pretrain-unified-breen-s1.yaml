defaults:
    - pretrain-unified-breen
    - _self_

# BREEN port (spec 2026-06-24) — STAGE 1: full-unfreeze caption alignment,
# continuing from the S0 frozen-LM checkpoint. The LM trunk now trains jointly
# with the visual pathway on the same caption stream (BREEN ptr1 fully
# unfreezes). Placement stays after_image; the breen distill stays on at
# weight 1.0. LR 4e-5 across all groups.
#
# Launch (S0 checkpoint REQUIRED — no default, launching without it would
# retrain a baseline), from THIS worktree:
#   VLM_BREEN_S0_CKPT=/.../breen-s0-align-frozen-lm/checkpoint-NNNN \
#     CONFIG_NAME=pretrain-unified-breen-s1 sbatch devtools/breen_train.slurm

trainer:
    # Full unfreeze: LM + connector (encoder-free has no separate vision tower).
    # The visual experts / queries / distill head stay trainable regardless.
    unfreeze:
        train_language_model: true
        train_connector: true
        train_vision_model: false
    from_pretrained: ${oc.env:VLM_BREEN_S0_CKPT}
    # S1 data budget = 10M caption samples (directive: S0's 5M ⊂ S1's 10M),
    # i.e. ~2x S0's steps at the same effective batch (accum=4 inherited from
    # pretrain-unified-breen). max_steps ~ 10M / measured samples_per_step; the
    # orchestrator refines it. (Was 5000 — a placeholder that only covered 5M.)
    max_steps: 10000
    save_steps: 1000
    learning_rate:
        visual_encoder_learning_rate: 4e-5
        connector_learning_rate: 4e-5
        language_model_learning_rate: 4e-5
        default_lr: 4e-5
    run_name: breen-s1-align-unfreeze
