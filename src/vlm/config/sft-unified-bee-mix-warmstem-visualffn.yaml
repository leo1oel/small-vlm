defaults:
    - sft-unified-bee-mix
    - _self_

# 1000-step catch-up matrix (2026-06-22) — MAX transplant: stack both weight
# transplants. SigLIP conv patch-embed at the INPUT (warm tokenizer: pretrained
# low-level features per patch) + per-layer visual-FFN experts init from the text
# FFN in the TRUNK (BREEN/Mono visual capacity). Under DELTA_TUNING the trainable
# set is exactly {connector + stem + mlp_visual experts + attention} — every
# trainable param is either transplanted-pretrained or alignment-critical, the
# from-scratch surface is minimized. The strongest within-encoder-free bet.
#
# Launch:
#   CONFIG_NAME=sft-unified-bee-mix-warmstem-visualffn DELTA_TUNING=1 \
#   sbatch -p ckpt-all -A krishna-ckpt --gpus=a40:4 --cpus-per-task=32 \
#     --mem=320G --time=8:00:00 train_l40s.slurm

model:
    connector:
        patch_stem: siglip
        patch_stem_name: google/siglip-base-patch16-224
        patch_stem_kernel: 16
        patch_stem_freeze: false
    visual_expert:
        enabled: true
        layers: null
        init_from_text: true

trainer:
    max_steps: 1500
    save_steps: 250
    learning_rate:
        connector_learning_rate: 2e-4
        language_model_learning_rate: 6e-5
        visual_encoder_learning_rate: 6e-5
        default_lr: 6e-5
    run_name: warmstem-visualffn-delta-1k
