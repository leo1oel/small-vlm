defaults:
    - sft-unified-bee-mix
    - _self_

# 1000-step catch-up matrix (2026-06-22) — "warm tokenizer". The native
# bottleneck is the tokenizer: a single linear turns a 48x48x3 raw patch into
# one token, vs CLIP's 12-layer ViT. This arm TRANSPLANTS SigLIP-B/16's
# pretrained conv patch-embed into the connector stem (each 48px model-patch =
# 3x3 grid of 16px sub-patches; the conv is a per-sub-patch linear, NO
# cross-patch attention -> still encoder-free) so the tokenizer is born with
# pretrained low-level visual features instead of random init. Output dim is
# kept == patch_dim (768*3*3 == 6912) so nothing downstream changes.
#
# Isolates the transplant effect (no distillation). Compare vs
# sft-unified-bee-mix (same data/steps, random tokenizer).
#
# Launch: CONFIG_NAME=sft-unified-bee-mix-warmstem \
#   sbatch -p gpu-a40 --gpus=a40:4 --cpus-per-task=32 --mem=320G train_l40s.slurm

model:
    connector:
        patch_stem: siglip
        patch_stem_name: google/siglip-base-patch16-224
        patch_stem_kernel: 16
        patch_stem_freeze: false

trainer:
    max_steps: 1500
    save_steps: 250
    # High connector LR (EVEv2/Mono two-LR): the LLM-default 6e-5 will not move a
    # warm tokenizer in 1000 steps. Stem + connector train fast; the LLM stays
    # gentle (6e-5). Pair with DELTA_TUNING=1 at submit (freeze text FFN, keep
    # connector + attention trainable) for the Mono/BREEN few-step recipe.
    learning_rate:
        connector_learning_rate: 2e-4
        language_model_learning_rate: 6e-5
        visual_encoder_learning_rate: 6e-5
        default_lr: 6e-5
    run_name: warmstem-siglip-1k
