defaults:
    - sft-unified-bee-mix
    - _self_

# 48G matrix — visual-FFN expert arm (A-pos; Mono-InternVL arXiv:2410.08202 /
# BREEN arXiv:2503.12446 style). Each decoder layer gets a sibling
# `mlp.mlp_visual` (a fresh FFN init-copied from the text FFN); image tokens are
# routed through it, text through the original FFN, blended by the image mask.
# Joint training: the experts live in the language_model LR group (no freeze).
# SAME blend / steps (5000) / acc / seed (42) / token budget as Arm 1
# (sft-unified-bee-mix) -> identical energon stream order, directly comparable.
# Tests the spec's central A-pos claim: dedicated visual capacity raises
# readiness (CKA/FDI) and accuracy, distinct from forcing fusion depth.
# Spec: docs/superpowers/specs/2026-06-14-native-vlm-capacity-readiness-design.md
#
# Cost note: blend runs BOTH FFNs on every token in training (~1.7-1.8x total
# FLOPs vs baseline). Stored params ~+1.0B (28 extra FFNs) -> ~2.8B; activated
# params per token unchanged. Fits 48G under ZeRO-2.
#
# Cluster launch (dedicated L40S, non-preemptible):
#   CONFIG_NAME=sft-unified-bee-mix-visualffn sbatch train_l40s.slurm

model:
    visual_expert:
        enabled: true
        layers: null # all decoder layers
        init_from_text: true

trainer:
    # Distinctive wandb run name (the baseline auto-name is indistinguishable
    # across arms — set it explicitly so runs are easy to tell apart).
    run_name: visualffn-beemix-2b
