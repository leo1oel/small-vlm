defaults:
  - sft-unified-bee-mix
  - _self_

# early-capacity arm (spec 2026-06-14, third lever): a dedicated internal
# visual-prefix — K=6 bidirectional layers process each image's connector
# tokens BEFORE they enter the shared LLM (NEO pre-Buffer style; a data-grown
# visual encoder with its own params, no imported ViT). Same blend / steps /
# seed / budget as Arm 1 (sft-unified-bee-mix) -> directly comparable. Tests
# whether building vision before the read point (the core diagnosis) is the
# binding lever, vs the capacity-in-stack (visualffn) and supervision (nepa)
# arms.
#
# Cost: +6 bidirectional layers (~+300M params, image-only compute). Fits 48G.
#
# Cluster launch:
#   CONFIG_NAME=sft-unified-bee-mix-prefix sbatch train_l40s.slurm

model:
  visual_prefix:
    enabled: true
    depth: 6

trainer:
  run_name: prefix6-beemix-2b
