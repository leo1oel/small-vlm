defaults:
    - sft-unified-bee-mix
    - _self_

# Distillation matrix (spec 2026-06-21) — VoRA arm (block-wise matched).
# Each listed early LLM block aligns 1:1 to a relative-depth-MATCHED CLIP block,
# RMSNorm+Linear head per block, per-patch neg cosine (VoRA arXiv:2503.20680,
# minus the LoRA — we train the trunk; teacher = CLIP not AIMv2 to match the
# sft-clip upper bound). 6 early blocks (capped for capture-memory; the proven
# aux-exit arm used 6) spanning the first half, each -> its matched CLIP block.
#
# Comparable to baseline-mix / repa. Launch:
#   CONFIG_NAME=sft-unified-bee-mix-distill-vora sbatch train_l40s.slurm

model:
    visual_distill:
        enabled: true
        method: vora
        teacher_kind: clip
        teacher_name: openai/clip-vit-base-patch16
        layers: [2, 4, 6, 8, 10, 12]

trainer:
    visual_distill_weight: 1.0
    run_name: distill-vora-beemix-2b
