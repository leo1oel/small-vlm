defaults:
  - sft-unified-bee-mix
  - _self_

# Distillation matrix (spec 2026-06-21) — SOFTDEPTH arm (OURS, the headline).
# A learned softmax over a pool of candidate depths picks WHICH layer serves as
# the internal visual encoder (the model self-selects placement, vs VoRA hard-
# coding the first N). One MLP head on the softmax-mixed (magnitude-normalized)
# hidden. Pool = 6 depths spanning the stack (capped for capture-memory). The
# logged "distill_sel_depth" reveals the chosen depth — the key result.
#
# Comparable to baseline-mix / repa. Launch:
#   CONFIG_NAME=sft-unified-bee-mix-distill-softdepth sbatch train_l40s.slurm

model:
  visual_distill:
    enabled: true
    method: softdepth
    teacher_kind: clip
    teacher_name: openai/clip-vit-base-patch16
    layers: [4, 8, 12, 16, 20, 24]

trainer:
  visual_distill_weight: 1.0
  run_name: distill-softdepth-beemix-2b
