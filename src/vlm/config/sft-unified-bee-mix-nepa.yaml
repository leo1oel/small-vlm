defaults:
    - sft-unified-bee-mix
    - _self_

# 48G matrix — visual-aux arm (nepa): Arm 1 (baseline-mix) plus the
# next-patch EMBEDDING prediction loss (NEPA, arXiv:2512.16922; stop-grad
# connector-output target, L2-norm cosine, spec
# 2026-06-06-visual-aux-loss-design.md). Same blend, steps, seed and token
# budget as Arm 1 -> identical energon stream order, directly comparable.
#
# wandb: collapse alarms land as visual_aux_cos / visual_aux_tgt_std —
# sustained cos -> 1 with tgt_std -> 0 is the collapse signature (stop-grad
# should prevent it; kill the run if both alarms fire together).
#
# Cluster launch (dedicated L40S, non-preemptible):
#   CONFIG_NAME=sft-unified-bee-mix-nepa sbatch train_l40s.slurm

model:
    visual_aux:
        objective: nepa

trainer:
    visual_aux_weight: 0.5
