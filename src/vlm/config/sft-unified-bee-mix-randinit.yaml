defaults:
  - sft-unified-bee-mix
  - _self_

# E1 — causal control for the text-prior hypothesis (spec 2026-06-18). Identical
# to Arm 1 (baseline-mix) in EVERY way except the LM is random-initialized
# (no pretrained text prior). Tests the causal claim "the pretrained text prior
# is what makes the model ride the prior instead of the image": with no cheap
# prior to ride, does the native model develop image-use (R0) faster / more?
#
# READOUT (interpret carefully — a from-scratch 1.7B LM is weak): the key metric
# is swap-acc vs chance (0.25 for 4-choice). Pretrained baseline rides the prior
# (swap-acc 0.37 >> 0.25). If random-init swap-acc collapses toward chance while
# intact-acc stays above it, the image is the ONLY signal it can use -> supports
# the hypothesis. If R0 stays ~0 AND intact ~chance, the model is just too weak
# (inconclusive) -> try a milder prior-reduction. Everything else (lr 6e-5,
# blend, steps, seed) held fixed so ONLY the prior differs.
#
# EARLY-STOP: eval R0 at ckpt 500/1000/1500 and compare to baseline-bee-mix at
# matched steps — do NOT train to 5000 if the trajectory is already clear.
#
# Cluster launch:
#   CONFIG_NAME=sft-unified-bee-mix-randinit sbatch train_l40s.slurm

model:
  language_model:
    random_init: true

trainer:
  run_name: randinit-beemix-2b
