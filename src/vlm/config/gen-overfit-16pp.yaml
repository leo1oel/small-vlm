defaults:
    - gen-overfit-16
    - _self_

# 16px overfit + the two pixel-space sharpness levers from PRX / HiDream-O1:
#   (1) BottleneckPatchEmbed in the gen embedder (768 -> 512 -> 2048), and
#   (2) perceptual supervision on the unpatchified x0 (LPIPS 0.1 + P-DINO 0.01,
#       weights from PRX configs).
# Compare its compare_grid against gen-overfit-16 (plain flow-matching MSE) to
# see whether the right column gets sharper. Consumed by gen_overfit_multi.py
# with -cn gen-overfit-16pp.

model:
    generation:
        embed_bottleneck_dim: 512     # hidden // 4 (HiDream-O1 geometry)
        perceptual_enabled: true
        perceptual_lpips_weight: 0.1
        perceptual_dino_weight: 0.01
        perceptual_lpips_net: vgg
        perceptual_dino_model: dinov2_vitb14_reg
        perceptual_resize: 224

trainer:
    run_name: gen-overfit-16pp
