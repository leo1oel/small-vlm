name: finetune
deepspeed: /pasteur/u/yiming/small-vlm/src/vlm/config/deepspeed/zero3.json
version: v1
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
warmup_ratio: 0.03
lr_scheduler_type: cosine
gradient_checkpointing: True
dataloader_num_workers: 4
dataloader_prefetch_factor: 2
save_only_model: True
report_to: wandb
# resume_from_checkpoint: resume_model_path
from_pretrained: /pasteur2/u/yiming/small-vlm/outputs/llava-7b-unified/pretrain/unified-pretrain/2025-09-06_09-52-22
# sequential_sampling: True
save_steps: 1000

defaults:
  - unfreeze: finetune
  - learning_rate: llava-finetune
  - weight_decay: default
