# S1 (caption-pretrain) unfreeze. These three flags govern ONLY the base
# transformer TRUNK:
#   train_vision_model    -> the vision tower / encoder (n/a for encoder-free)
#   train_language_model  -> the TEXT trunk: attention, text FFN, token
#                            embeddings, lm_head
#   train_connector       -> the vision->LLM connector / embedder
#
# They do NOT govern the per-layer VISUAL EXPERTS (FFN mlp_visual / norm
# norm_visual / attention proj_visual + their gates), the learnable QUERIES, or
# the visual DISTILL head. Those are ALWAYS trained when present -- force-enabled
# in train/set_trainable.py:set_trainable_params independent of these flags, so a
# frozen-LM stage still trains its visual capacity. This is deliberate: it
# prevents the silent-no-op trap where a frozen-LM arm would otherwise never
# train its visual experts. In the trainable-params log they are counted under
# their own `visual_expert` group, NOT under `language_model`.
train_vision_model: false
# false = the TEXT trunk is frozen. The visual experts / queries / distill head
# still train (force-enabled in set_trainable.py); see the header above.
train_language_model: false
train_connector: true
