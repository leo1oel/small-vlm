# BREEN SFT stream (arXiv:2503.12446 port, spec 2026-06-24): Honey-Data-1M
# (1M high-quality instruction samples; the captain confirmed SFT needs quality
# not quantity). Multi-turn instruct chat (image->text understanding) rendered
# with trainer.version=qwen_2_5. Format-generic energon understanding loader,
# one Azure blob folder with <folder>/train.jsonl. Credentials: AZURE_SAS_TOKEN
# (.env). max_steps > 0 required.

name: energon-honey-sft
type: energon
task: understanding

folders:
  yiming/Honey-Data-1M: 1.0
jsonl_name: train.jsonl

shuffle_buffer_size: 1000
length_buckets: [512, 768, 1024, 1536, 2304, 4096]
# 16000 (was 32000) so S2's effective batch stays at BREEN's ~256-sample SFT
# target on 8 GPU: eff-batch(tokens) = budget x world x accum, and S2 has accum=1
# (can't halve like the alignment stages). 16000*8*1 == the prior 32000*4*1.
batch_token_budget: 16000
max_samples_per_sequence: 100
num_workers: 12
