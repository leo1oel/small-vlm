# Mixed vision+audio streaming pretrain for the unified (encoder-free) model:
# blend two Azure blob folders with 2:1 sampling — image-text chat data and
# ASR-style audio data — into one stream. Each sample uses whatever media it
# carries (image / audio / both); absent modalities ride the zero-width-dummy
# path, so mixed batches train both connectors in the same run.
#
# Full training invocation (audio stays enabled in the model config):
#
#   python -m vlm -cn pretrain-unified \
#     model=qwen3-1.7b-unified dataset=energon-mix \
#     trainer.max_steps=20000
#
# Local smoke (Mac, mini jsonls, no deepspeed):
#
#   python -m vlm -cn pretrain-unified \
#     model=qwen3-0.6b-unified dataset=energon-mix \
#     dataset.jsonl_name=train_mini.jsonl dataset.num_workers=1 \
#     trainer.max_steps=3 trainer.per_device_train_batch_size=2 \
#     trainer.gradient_accumulation_steps=1 trainer.deepspeed=null \
#     trainer.attn_implementation=sdpa trainer.report_to=none
#
# Requirements: AZURE_SAS_TOKEN (env or .env), trainer.max_steps > 0.
# The jsonl of each folder is auto-downloaded + indexed once (resumable);
# media always streams lazily through the MSC range cache.

name: energon-mix
type: energon

# Multi-turn instruct data (LLaVA-OneVision-1.5-Instruct). Declared instruct so
# validate_dataset_config REJECTS pairing it with the 2-turn plain caption
# template (trainer.version=plain) — the plain preprocessor would drop all human
# text except media placeholders (#5). Pair instruct data with a chat template
# (e.g. trainer.version=qwen_2_5), or use a caption-only dataset with plain.
conversation_kind: instruct

# blob folder -> blend weight (sampling ratio, normalized automatically)
folders:
  LLaVA-OneVision-1.5-Instruct: 2.0
  audio: 1.0

shuffle_buffer_size: 10000
max_samples_per_sequence: 100 # randomness vs. sequential-read efficiency
num_workers: 4
