defaults:
    - sft-unified-bee-mix
    - _self_

# 1000-step catch-up matrix (2026-06-22) — FULL warm recipe: transplant SigLIP's
# conv patch-embed into the connector stem (pretrained low-level features at the
# input) AND distill the deep LLM layers toward SigLIP (softdepth) so the global,
# semantic features the conv can't provide are supervised into the trunk. Input
# transplant + output supervision, both from the SAME SigLIP — the most direct
# way to fold a pretrained encoder into the encoder-free path without a tower.
# Best single bet for the within-5-points goal.
#
# Launch: CONFIG_NAME=sft-unified-bee-mix-warmstem-distill \
#   sbatch -p gpu-a40 --gpus=a40:4 --cpus-per-task=32 --mem=320G train_l40s.slurm

model:
    connector:
        patch_stem: siglip
        patch_stem_name: google/siglip-base-patch16-224
        patch_stem_kernel: 16
        patch_stem_freeze: false
    visual_distill:
        enabled: true
        method: softdepth
        teacher_kind: siglip
        teacher_name: google/siglip-base-patch16-224
        layers: [4, 8, 12, 16, 20, 24]

trainer:
    max_steps: 1500
    save_steps: 250
    visual_distill_weight: 1.0
    # High connector LR (see warmstem.yaml); pair with DELTA_TUNING=1 at submit.
    learning_rate:
        connector_learning_rate: 2e-4
        language_model_learning_rate: 6e-5
        visual_encoder_learning_rate: 6e-5
        default_lr: 6e-5
    run_name: warmstem-distill-siglip-1k
