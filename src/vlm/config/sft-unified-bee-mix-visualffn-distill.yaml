defaults:
    - sft-unified-bee-mix
    - _self_

# 1000-step catch-up matrix (2026-06-22): STACK two legal encoder-free levers —
# Mono-InternVL visual-FFN experts (dedicated visual capacity INSIDE the stack)
# + SigLIP softdepth distillation (supervise that capacity toward a strong dense
# target). Hypothesis: capacity alone (visualffn@5000=40.3) and supervision alone
# (distill@2500~38) each plateau ~15pts below CLIP; giving the visual experts an
# explicit SigLIP target should converge MUCH faster than either alone. Still
# encoder-free (no tower at inference; experts are the model's own trained params,
# distill teacher is off the module tree).
#
# Short schedule for the 1000-step goal: 1500 steps / save 250 -> a 250..1500
# checkpoint curve, eval @1000 vs the sft-clip-bee-mix bar.
#
# Launch: CONFIG_NAME=sft-unified-bee-mix-visualffn-distill \
#   sbatch -p gpu-a40 --gpus=a40:4 --cpus-per-task=32 --mem=320G train_l40s.slurm

model:
    visual_expert:
        enabled: true
        layers: null
        init_from_text: true
    visual_distill:
        enabled: true
        method: softdepth
        teacher_kind: siglip
        teacher_name: google/siglip-base-patch16-224
        layers: [4, 8, 12, 16, 20, 24]

trainer:
    max_steps: 1500
    save_steps: 250
    visual_distill_weight: 1.0
    run_name: visualffn-distill-siglip-1k
