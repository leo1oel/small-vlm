defaults:
  - exp-encabl-native-s1
  - _self_

# 10-EXP ablation — Exp 10 (+ S1 caption-token dropout), STAGE 1.
# Base = exp-encabl-native-s1 (native encoder-free, qwen3-1.7b-unified, caption
# pretrain on energon-bee-stage2-wds, connector-only unfreeze, 5e9 effective
# tokens @ budget 24000 -> max_steps 34722, lr 8e-4). The ONLY delta vs base is
# caption-token (input word) dropout: during caption pretraining the model can
# lower the loss by predicting the next caption word from the previous ones and
# ignoring the image (the language-prior trap). This blanks a ramped fraction of
# the model's OWN teacher-forcing caption INPUT tokens — the supervised caption
# positions (labels != ignore_index; under `plain` the whole caption is
# supervised) — so it cannot lean on its own preceding words and must read the
# image. INPUT side only: dropped positions' input embeddings are zeroed (the
# repo "blank" idiom); labels are NEVER touched, so every position stays
# supervised. Image / audio / BOS / prompt tokens carry ignore_index, so they are
# never dropped. The rate ramps linearly 0.10 -> 0.30 across the optimizer-step
# budget (max_steps=34722), computed from the rank-identical HF Trainer global
# step (NOT a per-microbatch counter — that diverges under grad-accum/DDP).
# Identical token budget / steps / seed / data stream as the base -> directly
# comparable. STAGE 1 ONLY (S2 SFT disables it — see -s2).
#
# Stage 2 resumes from this run's checkpoint via exp-encabl-e10-captiondrop-s2
# (VLM_S1_CKPT=<this run's checkpoint dir>).

model:
  caption_token_dropout:
    enabled: true
    p_start: 0.10
    p_end: 0.30

trainer:
  run_name: encabl-e10-captiondrop-s1
