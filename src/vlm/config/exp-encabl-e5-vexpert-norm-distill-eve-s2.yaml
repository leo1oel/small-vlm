defaults:
  - exp-encabl-native-s2
  - _self_

# 10-EXP ablation — Exp 5 (+ visual expert + visual norm + distill CLIP), STAGE 2.
# Base = exp-encabl-native-s2. Carries the FFN expert + EVEv2 modality-norm
# expert + CLIP distillation (eve, anti-collapse A+B) through SFT with the LM
# UNFROZEN. Experts + distill head + debias EMA buffers serialize into the S1
# checkpoint and rebuild on the from_pretrained S2 build (trained buffers loaded,
# not reset). Pair VLM_S1_CKPT with the Exp-5 Stage-1 checkpoint.

model:
  visual_expert:
    enabled: true
    ffn: true
    norm: true
  visual_distill:
    enabled: true
    method: eve
    teacher_kind: clip
    teacher_name: openai/clip-vit-base-patch16
    debias_target: true
    debias_momentum: 0.9
    rkd_dist_weight: 1.0

trainer:
  visual_distill_weight: 1.0
  run_name: encabl-e5-vexpert-norm-distill-eve-s2
