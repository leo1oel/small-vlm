defaults:
  - sft-unified-bee-mix
  - _self_

# 1000-step catch-up matrix (2026-06-22): STACK two legal encoder-free levers —
# internal visual-prefix (K=6 bidirectional layers that BUILD vision before the
# read point; prefix@5000=41.3, current native best) + SigLIP softdepth
# distillation supervising the deep LLM layers. Hypothesis: the prefix grows a
# data-trained internal encoder but from scratch is slow; a SigLIP target gives
# its output a direction to converge to fast. Still encoder-free (prefix is the
# model's own trained params, no imported/frozen ViT; teacher off the tree).
#
# 1500 steps / save 250 -> 250..1500 curve, eval @1000 vs sft-clip-bee-mix bar.
#
# Launch: CONFIG_NAME=sft-unified-bee-mix-prefix-distill \
#   sbatch -p gpu-a40 --gpus=a40:4 --cpus-per-task=32 --mem=320G train_l40s.slurm

model:
  visual_prefix:
    enabled: true
    depth: 6
  visual_distill:
    enabled: true
    method: softdepth
    teacher_kind: siglip
    teacher_name: google/siglip-base-patch16-224
    layers: [4, 8, 12, 16, 20, 24]

trainer:
  max_steps: 1500
  save_steps: 250
  visual_distill_weight: 1.0
  run_name: prefix-distill-siglip-1k
