defaults:
  - sft-unified-bee-mix
  - _self_

# Distillation matrix (spec 2026-06-21) — VAE arm (low-level control).
# Teacher = a frozen SD-VAE encoder's latent grid (pixels/texture, no semantics)
# instead of CLIP, smooth-L1 on the latent. Isolates how much of any gain is
# SEMANTIC (CLIP) vs merely RECONSTRUCTIVE (VAE) — the negative control for the
# distillation story. teacher_kind=vae needs `diffusers` installed.
#
# Comparable to baseline-mix / repa. NOTE: smooth-L1 on latents has a different
# scale than the cosine arms — watch ce_final and lower the weight if CE moves.
# Launch:
#   CONFIG_NAME=sft-unified-bee-mix-distill-vae sbatch train_l40s.slurm

model:
  visual_distill:
    enabled: true
    method: vae
    teacher_kind: vae
    teacher_name: stabilityai/sd-vae-ft-mse

trainer:
  visual_distill_weight: 1.0
  run_name: distill-vae-beemix-2b
