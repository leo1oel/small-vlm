defaults:
  - _self_

# Stronger-encoder variant of qwen3-1.7b-clip: CLIP-ViT-L/14@336 tower + MLP
# connector on the same Qwen3-1.7B backbone. Every image becomes a fixed
# 576-token splice (336^2 / 14^2 patches, CLS dropped) vs the B/16 arm's 196 —
# higher resolution + ~3x the visual tokens. Vision hidden 1024 (vs 768) is
# read from the tower config automatically by the MLP connector.

language_model:
  hf_name: Qwen/Qwen3-1.7B
  max_seq_length: 4096

visual_encoder:
  hf_name: openai/clip-vit-large-patch14-336
  output_layer: -2 # standard LLaVA tap: penultimate layer features
  use_cls_token: false

connector:
  name: mlp_2_gelu
  type: mlp

audio:
  enabled: false # vision-only ablation; symmetric with the unified arm

name: qwen3-1.7b-clip-large
