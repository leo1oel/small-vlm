defaults:
  - _self_

# Encoder-free unified understanding model (gemma4_unified-style), small
# backbone for local smoke tests and pipeline debugging.

language_model:
  hf_name: Qwen/Qwen3-0.6B
  max_seq_length: 4096

visual_encoder:
  hf_name: null # encoder-free: no vision tower; raw patches -> connector
  patch_size: 16 # teacher patch, px
  pooling_kernel_size: 3 # model patch = 16*3 = 48px (gemma4 geometry)
  max_soft_tokens: 280 # per-image token budget (any positive int)
  # image_mean / image_std: null -> rescale-only, like gemma4

connector:
  name: raw_patch
  type: raw_patch
  # mm_embed_dim: null -> defaults to the LM hidden size
  # mm_posemb_size: null -> auto-filled with max_soft_tokens by load_model

audio:
  enabled: true # encoder-free audio: raw 16kHz waveform frames -> connector
  samples_per_token: 640 # 40ms per audio soft token (gemma4-compatible)
  sampling_rate: 16000
  max_audio_tokens: 750 # dataset-side cap: 30s per audio clip

name: qwen3-0.6b-unified
