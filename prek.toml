fail_fast = false

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "check-added-large-files" },
    { id = "check-case-conflict" },
    # neo_report/ holds generated research result dumps (minified JSON with no
    # trailing newline); exempt from the newline fixer like the JSON/markdown
    # formatters below, so the dir is not reformatted on every run.
    { id = "end-of-file-fixer", exclude = "^neo_report/" },
    { id = "fix-byte-order-marker" },
    { id = "check-json" },
    { id = "check-toml" },
    { id = "check-yaml" },
    { id = "check-xml" },
    { id = "mixed-line-ending" },
    { id = "check-symlinks" },
    { id = "check-merge-conflict" },
    { id = "detect-private-key" },
    { id = "check-executables-have-shebangs" },
    {
        id = "pretty-format-json",
        # neo_report/ holds generated research result dumps (large minified JSON);
        # not project data, exempt from JSON reformatting (same rationale as the
        # mdformat/markdownlint excludes below).
        args = [
            "--autofix",
            "--no-sort-keys"
        ],
        exclude = "^neo_report/"
    }
]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.43.3"
hooks = [
    { id = "typos" }
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.0"
hooks = [
    { id = "ruff-format" },
    {
        id = "ruff",
        args = ["--fix"]
    }
]

[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.0"
hooks = [
    { id = "gitleaks" }
]

[[repos]]
repo = "https://github.com/hukkin/mdformat"
rev = "1.0.0"
hooks = [
    {
        id = "mdformat",
        language = "python",
        # Generated working documents are exempt from markdown tooling:
        # docs/superpowers/ (AI plan files) carry pseudo-code blocks mdformat-black
        # cannot parse; neo_report/ holds generated research reports (mixed-language
        # headings, raw result dumps) that are not project documentation.
        exclude = "^(docs/superpowers/|neo_report/)",
        additional_dependencies = [
            "mdformat-gfm",
            "mdformat-black",
            "mdformat-mkdocs",
            "mdformat-footnote"
        ]
    }
]

[[repos]]
repo = "https://github.com/abravalheri/validate-pyproject"
rev = "v0.25"
hooks = [
    { id = "validate-pyproject" }
]

[[repos]]
repo = "https://github.com/igorshubovych/markdownlint-cli"
rev = "v0.47.0"
hooks = [
    { id = "markdownlint-fix", exclude = "^(docs/superpowers/|neo_report/)" }
]

[[repos]]
repo = "https://github.com/rbubley/mirrors-prettier"
rev = "v3.8.1"
hooks = [
    {
        id = "prettier",
        types_or = [
            "yaml",
            "toml"
        ]
    }
]
